app-id: com.jearcast.JearCast
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
base-version: '24.08'
command: jearcast-wrapper

sdk-extensions:
  - org.freedesktop.Sdk.Extension.node22

build-options:
  append-path: /usr/lib/sdk/node22/bin
  build-args:
    - --share=network
  env:
    npm_config_cache: /run/build/jearcast/.npm-cache

finish-args:
  - --share=network
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --socket=pulseaudio
  - --device=dri
  - --talk-name=org.freedesktop.Notifications
  # Permiso para comunicarse con el bus de mensajes
  - --talk-name=org.freedesktop.DBus
  # ESTE ES EL VITAL: Permite que tu app registre los controles en el sistema
  - --own-name=org.mpris.MediaPlayer2.jearcast
  - --filesystem=xdg-music:ro
  - --filesystem=xdg-download
  - --filesystem=~/.local/share/jearcast:create
  
modules:
  - name: jearcast
    buildsystem: simple
    build-commands:
      - npm config set cache /run/build/jearcast/.npm-cache
      - npm install
      - npm run build -- --linux dir
      
      - mkdir -p /app/lib/jearcast
      - mkdir -p /app/bin
      - mkdir -p /app/share/applications
      - mkdir -p /app/share/metainfo
      - mkdir -p /app/share/icons/hicolor
      
      # Copiar el contenido del build de electron
      - cp -r dist_electron/linux-unpacked/* /app/lib/jearcast/
      
      # COPIAR yt-dlp a MULTIPLES ubicaciones para asegurar que funcione
      # Ubicación 1: En la raíz de la app (para desarrollo directo)
      - mkdir -p /app/lib/jearcast/bin
      - cp bin/yt-dlp /app/lib/jearcast/bin/yt-dlp
      - chmod +x /app/lib/jearcast/bin/yt-dlp
      
      # Ubicación 2: Dentro del ASAR (para cuando el código busca en resources/app.asar/)
      - mkdir -p /app/lib/jearcast/resources/bin
      - cp bin/yt-dlp /app/lib/jearcast/resources/bin/yt-dlp
      - chmod +x /app/lib/jearcast/resources/bin/yt-dlp
      
      # Ubicación 3: Dentro de src (por si la ruta __dirname apunta a src/)
      - mkdir -p /app/lib/jearcast/resources/app.asar.unpacked/bin
      - cp bin/yt-dlp /app/lib/jearcast/resources/app.asar.unpacked/bin/yt-dlp
      - chmod +x /app/lib/jearcast/resources/app.asar.unpacked/bin/yt-dlp
      
      # Instalar wrapper
      - install -Dm755 flathub/jearcast-wrapper /app/bin/jearcast-wrapper
      
      # Instalar archivos desktop y metainfo
      - install -Dm644 flathub/com.jearcast.JearCast.desktop /app/share/applications/com.jearcast.JearCast.desktop
      - install -Dm644 flathub/com.jearcast.JearCast.metainfo.xml /app/share/metainfo/com.jearcast.JearCast.metainfo.xml
      
      # Instalar iconos
      - |
        for size in 32 64 128 256 512; do
          if [ -f flathub/icons/hicolor/${size}x${size}/apps/com.jearcast.JearCast.png ]; then
            install -Dm644 flathub/icons/hicolor/${size}x${size}/apps/com.jearcast.JearCast.png /app/share/icons/hicolor/${size}x${size}/apps/com.jearcast.JearCast.png
          fi
        done
      
      # Asegurar permisos
      - chmod +x /app/lib/jearcast/jearcast
      
      # Verificar que yt-dlp está en todas las ubicaciones
      - echo "=== Verificando yt-dlp ==="
      - echo "=== Ubicación 1: /app/lib/jearcast/bin/ ==="
      - ls -la /app/lib/jearcast/bin/ || echo "bin no existe"
      - test -f /app/lib/jearcast/bin/yt-dlp && echo "yt-dlp encontrado en /app/lib/jearcast/bin/" || echo "yt-dlp NO encontrado en /app/lib/jearcast/bin/"
      
      - echo "=== Ubicación 2: /app/lib/jearcast/resources/bin/ ==="
      - ls -la /app/lib/jearcast/resources/bin/ || echo "resources/bin no existe"
      - test -f /app/lib/jearcast/resources/bin/yt-dlp && echo "yt-dlp encontrado en /app/lib/jearcast/resources/bin/" || echo "yt-dlp NO encontrado en /app/lib/jearcast/resources/bin/"
      
      - echo "=== Ubicación 3: /app/lib/jearcast/resources/app.asar.unpacked/bin/ ==="
      - ls -la /app/lib/jearcast/resources/app.asar.unpacked/bin/ || echo "app.asar.unpacked/bin no existe"
      - test -f /app/lib/jearcast/resources/app.asar.unpacked/bin/yt-dlp && echo "yt-dlp encontrado en app.asar.unpacked/bin/" || echo "yt-dlp NO encontrado en app.asar.unpacked/bin/"
      
      # Debug: verificar estructura general
      - echo "=== Estructura de /app/lib/jearcast ==="
      - ls -la /app/lib/jearcast/
      - echo "=== Estructura de /app/lib/jearcast/resources ==="
      - ls -la /app/lib/jearcast/resources/ || echo "No existe resources/"
    sources:
      - type: git
        url: https://github.com/Josu09P/jearcastapp_electron_v3.git
        branch: main